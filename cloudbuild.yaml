steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/capstone-repo/notes-app:$SHORT_SHA', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/capstone-repo/notes-app:latest', 
      '.'
    ]

# Specify the bucket for your logs
logs_bucket: 'gs://log-bucket1112'

options:
  logging: GCS_ONLY 

# 2. Automatically push to your Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/capstone-repo/notes-app:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/capstone-repo/notes-app:latest'
